<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Portfolio</title>
    <style>
        :root { 
            --brand-purple: #663399; 
            --brand-white: #fdfdfd;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #eee;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--brand-white); margin: 0; padding: 0; color: var(--text-dark); }
        
        /* --- PREMIUM HEADER --- */
        .premium-header { 
            background: white; 
            padding: 60px 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }
        
        .header-content { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 50px;
        }

        .brand-stack { flex: 1; }

        .name-and-title h1 { 
            margin: 0; 
            font-size: 2.6rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--brand-purple);
            font-weight: 300; 
        }
        .name-and-title p { 
            color: var(--text-muted); 
            margin: 8px 0 0; 
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- CONTACT STACK --- */
        .contact-info { 
            margin-top: 20px; 
            display: flex; 
            gap: 20px; 
            font-size: 0.95rem;
        }
        .contact-info a { 
            color: var(--text-dark); 
            text-decoration: none; 
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .contact-info a:hover { border-color: var(--brand-purple); color: var(--brand-purple); }

        /* --- BROKERAGE SECTION (Fix for Stretching) --- */
        .brokerage-block { 
            margin-top: 35px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .corcoran-logo { 
            height: 70px; 
            width: auto; 
            max-width: 300px; /* Limits horizontal stretch */
            object-fit: contain; /* CRITICAL FIX: Maintains original proportions */
            display: block; 
            margin-left: -4px;
        }
        .brokerage-name { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #999; 
            font-weight: bold;
        }

        .photo-column { flex-shrink: 0; }
        .claudine-headshot { 
            width: 300px; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 4px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08); 
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 768px) {
            .header-content { 
                flex-direction: column-reverse; 
                text-align: center;
                gap: 40px;
                padding: 0 10px;
            }
            .brand-stack { width: 100%; }
            .contact-info { justify-content: center; flex-wrap: wrap; gap: 15px; }
            .brokerage-block { align-items: center; }
            .corcoran-logo { margin-left: 0; height: 60px; }
            .claudine-headshot { width: 100%; max-width: 340px; height: auto; }
        }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        #listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
