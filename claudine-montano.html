<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Portfolio</title>
    <style>
        :root { 
            --brand-purple: #663399; 
            --brand-gold: #D4AF37; 
            --brand-white: #fdfdfd;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #eee;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--brand-white); margin: 0; padding: 0; color: var(--text-dark); }
        
        /* --- RESPONSIVE HEADER --- */
        .premium-header { 
            background: white; 
            padding: 60px 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }
        
        .header-content { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 40px;
        }

        .brand-stack { flex: 1; }

        .name-and-title h1 { 
            margin: 0; 
            font-size: 2.4rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--brand-purple);
            font-weight: 300; 
        }
        .name-and-title p { 
            color: var(--text-muted); 
            margin: 8px 0 20px; 
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .corcoran-logo { height: 40px; width: auto; margin-top: 20px; display: block; }

        .photo-column { flex-shrink: 0; }
        .claudine-headshot { 
            width: 280px; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 768px) {
            .header-content { 
                flex-direction: column-reverse; /* Put photo on top for mobile */
                text-align: center;
                gap: 30px;
            }
            .brand-stack { width: 100%; }
            .corcoran-logo { margin: 20px auto 0; }
            .claudine-headshot { width: 100%; max-width: 320px; height: auto; }
        }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
        #listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 20px; }
        .status-tag { display: inline-block; font-size: 0.7rem; font-weight: bold; color: var(--brand-purple); text-transform: uppercase; margin-bottom: 10px; padding: 4px 10px; background: rgba(102, 51, 153, 0.05); border-radius: 4px; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        iframe { flex-grow: 1; border: none; width: 100%; }
        .close-btn { background: #f5f5f5; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; color: var(--brand-purple); }
    </style>
</head>
<body>

    <div class="premium-header">
        <div class="header-content">
            <div class="brand-stack">
                <div class="name-and-title">
                    <h1>Claudine Montano</h1>
                    <p>Featured Property Portfolio</p>
                </div>
                <img src="image_3.png" alt="Corcoran Horizon Realty" class="corcoran-logo">
            </div>
            <div class="photo-column">
                <img src="image_4.png" alt="Claudine Montano" class="claudine-headshot">
            </div>
        </div>
    </div>

    <div class="container">
        <div id="listings-grid"></div>
    </div>

    <div id="modal">
        <div class="modal-nav">
            <span id="modal-title" style="font-weight:bold; color: #663399;">VIRTUAL TOUR</span>
            <button class="close-btn" onclick="closeModal()">CLOSE ✕</button>
        </div>
        <iframe id="tour-frame"></iframe>
    </div>

<script>
    const BASE_WEBHOOK_URL = 'https://hook.us2.make.com/dmsl6dvmmv19yjda8btj72odci0sfeff';
    const AGENT_FIRST_NAME = 'Claudine'; 
    const AGENT_LAST_NAME = 'Montano';

    async function loadPortal() {
        const grid = document.getElementById('listings-grid');
        try {
            const fetchUrl = `${BASE_WEBHOOK_URL}?search=${encodeURIComponent(AGENT_FIRST_NAME + ' ' + AGENT_LAST_NAME)}`;
            const response = await fetch(fetchUrl);
            const result = await response.json();

            if (!result.data || result.data.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:40px;">No properties found.</div>`;
                return;
            }

            grid.innerHTML = ''; 
            result.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const addr = item.address?.unparsed_address || item.display_address || "Listing Details";
                const img = item.thumbnail_url || item.main_image_url;

                card.innerHTML = `
                    <img src="${img}">
                    <div class="card-body">
                        <span class="status-tag">${(item.status || 'Active').replace(/_/g, ' ')}</span>
                        <h3 style="margin:0; font-size:1.1rem; font-weight:400;">${addr}</h3>
                    </div>
                `;

                card.onclick = () => {
                    document.getElementById('modal-title').innerText = addr.toUpperCase();
                    document.getElementById('tour-frame').src = `https://listings.homesinmotion.ca/v2/${item.id}`;
                    document.getElementById('modal').style.display = 'flex';
                    document.body.style.overflow = 'hidden'; 
                };
                grid.appendChild(card);
            });
        } catch (err) {
            grid.innerHTML = `<div style="text-align:center; color:red; padding:40px;">Error loading listings.</div>`;
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('tour-frame').src = '';
        document.body.style.overflow = 'auto'; 
    }

    loadPortal();
</script>
</body>
</html>
