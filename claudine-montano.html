<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Portfolio</title>
    <style>
        :root { 
            --brand-purple: #663399; 
            --brand-white: #fdfdfd;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #eee;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--brand-white); margin: 0; padding: 0; color: var(--text-dark); }
        
        /* --- PREMIUM HEADER --- */
        .premium-header { 
            background: white; 
            padding: 60px 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }
        
        .header-content { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 50px;
        }

        .brand-stack { flex: 1; }

        .name-and-title h1 { 
            margin: 0; 
            font-size: 2.6rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--brand-purple);
            font-weight: 300; 
        }
        .name-and-title p { 
            color: var(--text-muted); 
            margin: 8px 0 0; 
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- CONTACT STACK --- */
        .contact-info { 
            margin-top: 20px; 
            display: flex; 
            gap: 20px; 
            font-size: 1rem;
            font-weight: 500;
        }
        .contact-info a { 
            color: var(--brand-purple); 
            text-decoration: none; 
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .contact-info a:hover { border-bottom-color: var(--brand-purple); }

        /* --- BROKERAGE SECTION (Anti-Stretch Fix) --- */
        .brokerage-block { 
            margin-top: 35px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .corcoran-logo { 
            height: 75px; 
            width: auto; 
            max-width: 320px;
            object-fit: contain; /* Prevents horizontal stretching */
            display: block; 
            margin-left: -4px;
        }
