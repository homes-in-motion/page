<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Portfolio</title>
    <style>
        :root { 
            --brand-purple: #663399; 
            --brand-white: #fdfdfd;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #eee;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--brand-white); margin: 0; padding: 0; color: var(--text-dark); }
        
        /* --- PREMIUM HEADER --- */
        .premium-header { 
            background: white; 
            padding: 60px 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }
        
        .header-content { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 50px;
        }

        .brand-stack { flex: 1; }

        .name-and-title h1 { 
            margin: 0; 
            font-size: 2.6rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--brand-purple);
            font-weight: 300; 
        }
        .name-and-title p { 
            color: var(--text-muted); 
            margin: 8px 0 0; 
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- CONTACT STACK --- */
        .contact-info { 
            margin-top: 20px; 
            display: flex; 
            gap: 20px; 
            font-size: 0.95rem;
        }
        .contact-info a { 
            color: var(--text-dark); 
            text-decoration: none; 
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .contact-info a:hover { border-color: var(--brand-purple); color: var(--brand-purple); }

        /* --- BROKERAGE SECTION --- */
        .brokerage-block { 
            margin-top: 35px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .corcoran-logo { 
            height: 65px; /* Increased size */
            width: auto; 
            display: block; 
            margin-left: -4px; /* Optical alignment */
        }
        .brokerage-name { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #999; 
            font-weight: bold;
        }

        .photo-column { flex-shrink: 0; }
        .claudine-headshot { 
            width: 300px; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 4px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08); 
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 768px) {
            .header-content { 
                flex-direction: column-reverse; 
                text-align: center;
                gap: 40px;
                padding: 0 10px;
            }
            .brand-stack { width: 100%; }
            .contact-info { justify-content: center; flex-wrap: wrap; gap: 15px; }
            .brokerage-block { align-items: center; }
            .corcoran-logo { margin-left: 0; height: 55px; }
            .claudine-headshot { width: 100%; max-width: 340px; height: auto; }
        }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        #listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-body { padding: 25px; }
        .status-tag { display: inline-block; font-size: 0.75rem; font-weight: bold; color: var(--brand-purple); text-transform: uppercase; margin-bottom: 12px; padding: 5px 12px; background: rgba(102, 51, 153, 0.05); border-radius: 4px; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        iframe { flex-grow: 1; border: none; width: 100%; }
        .close-btn { background: #1a1a1a; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="premium-header">
        <div class="header-content">
            <div class="brand-stack">
                <div class="name-and-title">
                    <h1>Claudine Montano</h1>
                    <p>Broker | REALTOR&reg;</p>
                </div>

                <div class="contact-info">
                    <a href="mailto:claudine@claudinemontano.com">claudine@claudinemontano.com</a>
                    <a href="tel:4165550199">416.555.0199</a>
                </div>

                <div class="brokerage-block">
                    <img src="image_3.png" alt="Corcoran" class="corcoran-logo">
                    <span class="brokerage-name">Corcoran Horizon Realty</span>
                </div>
            </div>

            <div class="photo-column">
                <img src="image_4.png" alt="Claudine Montano" class="claudine-headshot">
            </div>
        </div>
    </div>

    <div class="container">
        <div id="listings-grid"></div>
    </div>

    <div id="modal">
        <div class="modal-nav">
            <span id="modal-title" style="font-weight:bold; color: #663399; letter-spacing: 1px;">VIRTUAL PROPERTY TOUR</span>
            <button class="close-btn" onclick="closeModal()">Close Tour ✕</button>
        </div>
        <iframe id="tour-frame"></iframe>
    </div>

<script>
    const BASE_WEBHOOK_URL = 'https://hook.us2.make.com/dmsl6dvmmv19yjda8btj72odci0sfeff';
    const AGENT_SEARCH_NAME = 'Claudine Montano';

    async function loadPortal() {
        const grid = document.getElementById('listings-grid');
        try {
            const fetchUrl = `${BASE_WEBHOOK_URL}?search=${encodeURIComponent(AGENT_SEARCH_NAME)}`;
            const response = await fetch(fetchUrl);
            const result = await response.json();

            if (!result.data || result.data.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:60px; color:#888;">No featured properties currently available.</div>`;
                return;
            }

            grid.innerHTML = ''; 
            result.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const addr = item.address?.unparsed_address || item.display_address || "Exclusive Listing";
                const img = item.thumbnail_url || item.main_image_url;

                card.innerHTML = `
                    <img src="${img}">
                    <div class="card-body">
                        <span class="status-tag">${(item.status || 'Active').replace(/_/g, ' ')}</span>
                        <h3 style="margin:0; font-size:1.15rem; font-weight:400; line-height:1.5;">${addr}</h3>
                    </div>
                `;

                card.onclick = () => {
                    document.getElementById('modal-title').innerText = addr.toUpperCase();
                    document.getElementById('tour-frame').src = `https://listings.homesinmotion.ca/v2/${item.id}`;
                    document.getElementById('modal').style.display = 'flex';
                    document.body.style.overflow = 'hidden'; 
                };
                grid.appendChild(card);
            });
        } catch (err) {
            grid.innerHTML = `<div style="text-align:center; color:red; padding:60px;">Unable to connect to the portfolio server. Please refresh.</div>`;
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('tour-frame').src = '';
        document.body.style.overflow = 'auto'; 
    }

    loadPortal();
</script>
</body>
</html>
